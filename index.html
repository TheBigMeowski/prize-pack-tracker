<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>ALTTP Prize Pack Tracker by Meowski</title>
        <link rel="icon" href="assets/meowski.ico" type="image/x-icon">
        <link rel="stylesheet" href="prizepacks.css?v=20260603">
        <script src="prizepacks.js?v=20260603" defer></script>
    </head>
    <body>
        <main class="app">
            <header class="appHeader">
                <h1>ALTTP Prize Pack Tracker</h1>
                <p class="creatorCredit">
                    <span>by</span>
                    <a
                        class="creatorLink"
                        href="https://www.speedrun.com/users/Meowski"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        <span class="creatorBadge">
                            <img src="assets/meowski.ico" alt="" class="creatorBadgeIcon">
                        </span>
                        <span class="creatorName">Meowski</span>
                    </a>
                </p>
            </header>

            <div class="trackerStage">
                <section class="packGroups" aria-label="Prize packs">
                    <div class="packGroup" data-pack-id="hearts">
                        <table id="hearts"></table>
                        <button type="button" data-action="increment" aria-label="Advance hearts prize pack">&rarr;</button>
                    </div>
                    <div class="packGroup" data-pack-id="rupees">
                        <table id="rupees"></table>
                        <button type="button" data-action="increment" aria-label="Advance rupees prize pack">&rarr;</button>
                    </div>
                    <div class="packGroup" data-pack-id="magic">
                        <table id="magic"></table>
                        <button type="button" data-action="increment" aria-label="Advance magic prize pack">&rarr;</button>
                    </div>
                    <div class="packGroup" data-pack-id="bombs">
                        <table id="bombs"></table>
                        <button type="button" data-action="increment" aria-label="Advance bombs prize pack">&rarr;</button>
                    </div>
                    <div class="packGroup" data-pack-id="arrows">
                        <table id="arrows"></table>
                        <button type="button" data-action="increment" aria-label="Advance arrows prize pack">&rarr;</button>
                    </div>
                    <div class="packGroup" data-pack-id="variety-1">
                        <table id="variety-1"></table>
                        <button type="button" data-action="increment" aria-label="Advance variety 1 prize pack">&rarr;</button>
                    </div>
                    <div class="packGroup" data-pack-id="variety-2">
                        <table id="variety-2"></table>
                        <button type="button" data-action="increment" aria-label="Advance variety 2 prize pack">&rarr;</button>
                    </div>
                </section>

                <section class="controlsPanel" id="controlsPanel" aria-label="Controls" aria-hidden="true">
                    <h2>Controls</h2>
                    <div class="controlsList" id="controlsList"></div>
                </section>
            </div>

            <footer class="appFooter">
                <div class="footerActions">
                    <button type="button" id="resetButton">Reset</button>
                    <button type="button" id="toggleEnemiesButton" aria-pressed="false">Show Enemies</button>
                    <button type="button" id="controlsButton" aria-controls="controlsPanel" aria-pressed="false">Show Controls</button>
                </div>
            </footer>
        </main>
    </body>
</html>
