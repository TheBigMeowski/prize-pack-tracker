<!DOCTYPE html>
<html>
    <head>
        <title>ALTTP Prize Pack Tracker by Meowski</title>
        <!-- TODO put css etc in here -->
        <script src="prizepacks.js"></script>
        <link rel="stylesheet" href="prizepacks.css">
    </head>
    <body>
        <h1>ALTTP Prize Pack Tracker by Meowski</h1>
        <div class="packGroups">
            <div class="packGroup">
                <table id="hearts"></table>
                <button onclick="incrementPackTable(heartPack)">&rarr;</button>
            </div>
            <div class="packGroup">
                <table id="rupees"></table>
                <button onclick="incrementPackTable(rupeePack)">&rarr;</button>
            </div>
            <div class="packGroup">
                <table id="magic"></table>
                <button onclick="incrementPackTable(magicPack)">&rarr;</button>
            </div>
            <div class="packGroup">
                <table id="bombs"></table>
                <button onclick="incrementPackTable(bombPack)">&rarr;</button>
            </div>
            <div class="packGroup">
                <table id="arrows"></table>
                <button onclick="incrementPackTable(arrowPack)">&rarr;</button>
            </div>
            <div class="packGroup">
                <table id="var 1"></table>
                <button onclick="incrementPackTable(varietyPackOne)">&rarr;</button>
            </div>
            <div class="packGroup">
                <table id="var 2"></table>
                <button onclick="incrementPackTable(varietyPackTwo)">&rarr;</button>
            </div>
        </div>
        <div>
            <button onclick="resetTables()">reset</button>
        </div>
        <div>
            <a href="https://alttp-wiki.net/index.php/Enemy_prize_packs">More information on prize packs</a>
        </div>
    </body>
</html>
